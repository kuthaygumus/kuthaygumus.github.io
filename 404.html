<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found — Kuthay Gumus">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self'; connect-src 'none'; script-src 'none'; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'none';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="theme-color" content="#fbfbfd" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)">
    <meta property="og:title" content="Page Not Found — Kuthay Gumus">
    <meta property="og:image" content="https://kuthaygumus.github.io/assets/og-card.png">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/shared.css">
    <title>Page Not Found — Kuthay Gumus</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            font-size: 16px;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .not-found {
            text-align: center;
            padding: 24px;
        }
        .not-found-code {
            font-size: 72px;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            color: var(--text);
            margin-bottom: 8px;
        }
        .not-found-title {
            font-size: 20px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        .not-found-link {
            display: inline-block;
            font-size: 15px;
            font-weight: 500;
            color: var(--link);
            text-decoration: none;
            transition: color 0.15s ease;
        }
        .not-found-link:hover { color: var(--link-hover); }
        .not-found-link:focus-visible { outline: 2px solid var(--link); outline-offset: 3px; border-radius: 4px; }
    </style>
</head>
<body>
    <main class="not-found">
        <div class="not-found-code">404</div>
        <p class="not-found-title">Page not found</p>
        <a href="/" class="not-found-link">&larr; Back to home</a>
    </main>
</body>
</html>
